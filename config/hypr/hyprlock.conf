general {
    hide_cursor = true
}

background {
    monitor =
    path = $HOME/.config/hypr/wallpaper.jpg
    blur_passes = 3
    blur_size = 5
    brightness = 0.5
}

input-field {
    monitor =
    size = 300, 50
    outline_thickness = 2
    outer_color = rgba(33ccffee)
    inner_color = rgba(1a1b26cc)
    font_color = rgba(cdd6f4ff)
    placeholder_text = <i>Password...</i>
    fail_color = rgba(f38ba8ff)
    check_color = rgba(00ff99ee)
    capslock_color = rgba(f9e2afff)
    position = 0, -80
    halign = center
    valign = center
}

label {
    monitor =
    text = cmd[update:1000] date +"%H:%M"
    color = rgba(cdd6f4ff)
    font_size = 64
    font_family = JetBrainsMono Nerd Font
    position = 0, 200
    halign = center
    valign = center
}

label {
    monitor =
    text = cmd[update:60000] date +"%A, %B %d"
    color = rgba(a6adc8ff)
    font_size = 18
    font_family = JetBrainsMono Nerd Font
    position = 0, 120
    halign = center
    valign = center
}
