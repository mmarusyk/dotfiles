name: kitty_ubuntu
description: Install and configure Kitty terminal on Ubuntu
depends_on:
  - zellij

steps:
  - name: install_kitty
    script: |
      sudo apt-get install -y kitty

  - name: link_config
    script: |
      mkdir -p "$HOME/.config/kitty"
      ln -sf "$ROOT_DIR/config/kitty/kitty.conf" "$HOME/.config/kitty/kitty.conf"
      ln -sf "$ROOT_DIR/config/kitty/launch.sh" "$HOME/.config/kitty/launch.sh"
