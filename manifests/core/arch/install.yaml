name: core_arch_install
description: Install base dependencies for Arch Linux

steps:
  - name: update_system
    script: sudo pacman -Syu --noconfirm

  - name: install_basics
    script: sudo pacman -S --noconfirm base-devel git curl wget yq less brightnessctl

  - name: install_yay
    script: |
      if ! command -v yay &> /dev/null; then
        git clone https://aur.archlinux.org/yay.git /tmp/yay
        cd /tmp/yay
        makepkg -si --noconfirm
        cd -
        rm -rf /tmp/yay
      else
        echo "yay is already installed."
      fi

  - name: install_network_manager
    script: |
      sudo pacman -S --noconfirm --needed networkmanager nm-connection-editor
      sudo systemctl enable --now NetworkManager
      sudo systemctl disable --now iwd 2>/dev/null || true

  - name: create_user_dirs
    script: |
      sudo pacman -S --noconfirm --needed xdg-user-dirs
      xdg-user-dirs-update

  - name: install_flatpak
    script: |
      sudo pacman -S --noconfirm flatpak

  - name: enable_flathub
    script: |
      sudo flatpak remote-add --if-not-exists flathub https://flathub.org/repo/flathub.flatpakrepo
