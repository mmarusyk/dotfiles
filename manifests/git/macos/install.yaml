name: git_macos
description: Install and configure Git on macOS

steps:
  - name: install_git
    script: |
      log_verbose "📦 Installing..."
      brew install git

  - name: link_config
    script: |
      log_verbose "📝 Linking..."
      ROOT_DIR="$(cd "$(dirname "${BASH_SOURCE[0]}")/../../.." && pwd)"
      ln -sf "$ROOT_DIR/config/git/gitconfig" "$HOME/.gitconfig"

  - name: configure_user
    script: |
      echo "👤 Configuring Git user identification..."

      if [[ -f ~/.dotfiles.env ]]; then
        source ~/.dotfiles.env
      fi

      if [[ -n "${DOTFILES_USER_NAME//[[:space:]]/}" ]]; then
        git config --file "$HOME/.gitconfig.local" user.name "$DOTFILES_USER_NAME"
        echo "✅ Set user.name: $DOTFILES_USER_NAME"
      fi

      if [[ -n "${DOTFILES_USER_EMAIL//[[:space:]]/}" ]]; then
        git config --file "$HOME/.gitconfig.local" user.email "$DOTFILES_USER_EMAIL"
        echo "✅ Set user.email: $DOTFILES_USER_EMAIL"
      fi
