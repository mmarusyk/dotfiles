name: zellij_ubuntu
description: Install and configure Zellij terminal multiplexer on Ubuntu

steps:
  - name: install_dependencies
    script: |
      log_verbose "📦 Installing build dependencies..."
      sudo apt update -y
      sudo apt install -y build-essential

  - name: install_rust
    script: |
      log_verbose "🦀 Checking if Cargo (Rust) is installed..."
      if ! command -v cargo &> /dev/null; then
        log_verbose "📦 Installing..."
        curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y
        export PATH="$HOME/.cargo/bin:$PATH"
        echo "✅ Rust installed!"
      else
        log_verbose "✅ Cargo already installed."
      fi

  - name: install_zellij
    script: |
      log_verbose "📦 Installing Zellij..."
      export PATH="$HOME/.cargo/bin:$PATH"
      cargo install zellij
      echo "✅ Zellij installed!"

  - name: link_config
    script: |
      log_verbose "📝 Linking Zellij config..."
      ROOT_DIR="$(cd "$(dirname "${BASH_SOURCE[0]}")/../../.." && pwd)"
      mkdir -p "$HOME/.config/zellij"
      ln -sf "$ROOT_DIR/config/zellij/config.kdl" "$HOME/.config/zellij/config.kdl"
      log_verbose "✅ Configured!"
