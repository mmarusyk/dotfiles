name: zellij_ubuntu
description: Install and configure Zellij terminal multiplexer on Ubuntu
depends_on:
  - zsh

steps:
  - name: install_zellij
    script: |
      if command -v zellij &>/dev/null; then
        log_info "✅ Zellij is already installed ($(zellij --version))"
        exit 0
      fi
      ARCH=$(uname -m)
      VERSION=$(curl -s https://api.github.com/repos/zellij-org/zellij/releases/latest \
        | grep '"tag_name"' | sed 's/.*"tag_name": "\(.*\)".*/\1/')
      curl -L "https://github.com/zellij-org/zellij/releases/download/${VERSION}/zellij-${ARCH}-unknown-linux-musl.tar.gz" \
        -o /tmp/zellij.tar.gz
      tar -xzf /tmp/zellij.tar.gz -C /tmp
      sudo mv /tmp/zellij /usr/local/bin/zellij
      rm /tmp/zellij.tar.gz

  - name: link_config
    script: |
      mkdir -p "$HOME/.config/zellij"
      ln -sf "$ROOT_DIR/config/zellij/config.kdl" "$HOME/.config/zellij/config.kdl"
