name: zellij_arch
description: Install and configure Zellij terminal multiplexer on Arch Linux

steps:
  - name: install_zellij
    script: |
      sudo pacman -S --noconfirm --needed zellij

  - name: link_config
    script: |
      mkdir -p "$HOME/.config/zellij"
      ln -sf "$ROOT_DIR/config/zellij/config.kdl" "$HOME/.config/zellij/config.kdl"
