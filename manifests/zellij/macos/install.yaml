name: zellij_macos
description: Install and configure Zellij terminal multiplexer on macOS

steps:
  - name: install_dependencies
    script: |
      log_verbose "📦 Installing..."
      brew install curl

  - name: install_rust
    script: |
      log_verbose "🦀 Checking..."
      if ! command -v cargo &> /dev/null; then
        echo "📦 Cargo (Rust) not found! Installing Rust..."
        curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y
        export PATH="$HOME/.cargo/bin:$PATH"
        echo "✅ Rust and Cargo installed successfully!"
      else
        echo "✅ Cargo (Rust) is already installed."
      fi

  - name: install_zellij
    script: |
      log_verbose "📦 Installing..."
      export PATH="$HOME/.cargo/bin:$PATH"
      cargo install zellij
      echo "✅ Zellij installed successfully!"

  - name: link_config
    script: |
      log_verbose "📝 Linking..."
      mkdir -p "$HOME/.config/zellij"
      ln -sf "$ROOT_DIR/config/zellij/config.kdl" "$HOME/.config/zellij/config.kdl"
      echo "✅ Zellij configured successfully!"
