name: docker_macos
description: Install Colima on macOS

steps:
  - name: install_colima
    script: |
      if command -v docker &>/dev/null; then
        echo "✅ Docker is already installed."
      else
        log_verbose "📦 Installing..."
        brew install colima docker docker-compose docker-buildx
        echo "✅ Colima installed!"
      fi

  - name: start_colima
    script: |
      colima start
