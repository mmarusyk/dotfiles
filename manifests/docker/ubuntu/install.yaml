name: docker_ubuntu
description: Install Podman on Ubuntu

steps:
  - name: install_podman
    script: |
      if command -v podman &>/dev/null; then
        echo "✅ Podman is already installed."
      else
        log_verbose "📦 Installing..."
        sudo apt-get install -y podman
        echo "✅ Podman installed!"
      fi

  - name: alias_docker
    script: |
      if ! grep -q 'alias docker=podman' "$HOME/.aliases.zsh" 2>/dev/null; then
        echo 'alias docker=podman' >> "$HOME/.aliases.zsh"
      fi
