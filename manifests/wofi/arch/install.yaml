name: wofi_arch
description: Install Wofi application launcher

steps:
  - name: install_wofi
    script: |
      sudo pacman -S --needed --noconfirm wofi

  - name: link_config
    script: |
      mkdir -p "$HOME/.config/wofi"
      ln -sf "$ROOT_DIR/config/wofi/style.css" "$HOME/.config/wofi/style.css"
