name: waybar_arch
description: Install and configure Waybar status bar for Hyprland on Arch Linux

steps:
  - name: install_waybar
    script: sudo pacman -S --needed --noconfirm waybar blueman pavucontrol network-manager-applet gsimplecal

  - name: enable_bluetooth
    script: |
      sudo systemctl enable --now bluetooth.service

  - name: link_config
    script: |
      mkdir -p "$HOME/.config/waybar/scripts"
      ln -sf "$ROOT_DIR/config/waybar/config.jsonc" "$HOME/.config/waybar/config.jsonc"
      ln -sf "$ROOT_DIR/config/waybar/style.css" "$HOME/.config/waybar/style.css"
      ln -sf "$ROOT_DIR/config/waybar/scripts/powermenu.sh" "$HOME/.config/waybar/scripts/powermenu.sh"
      chmod +x "$HOME/.config/waybar/scripts/powermenu.sh"
