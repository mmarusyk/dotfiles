name: hyprlock_arch
description: Install and configure hyprlock screen locker for Hyprland on Arch Linux

steps:
  - name: install_hyprlock
    script: sudo pacman -S --noconfirm --needed hyprlock

  - name: link_config
    script: |
      mkdir -p "$HOME/.config/hypr"
      ln -sf "$ROOT_DIR/config/hypr/hyprlock.conf" "$HOME/.config/hypr/hyprlock.conf"
