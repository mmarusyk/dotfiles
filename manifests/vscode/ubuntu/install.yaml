name: vscode_ubuntu_install
description: Install Visual Studio Code

steps:
  - name: install_signing_key
    script: |
      if [[ -f /usr/share/keyrings/microsoft.gpg ]]; then
        log_info "✅ Microsoft signing key already installed"
      else
        sudo apt-get install -y wget gpg
        wget -qO- https://packages.microsoft.com/keys/microsoft.asc | gpg --dearmor > microsoft.gpg
        sudo install -D -o root -g root -m 644 microsoft.gpg /usr/share/keyrings/microsoft.gpg
        rm -f microsoft.gpg
      fi

  - name: add_repository
    script: |
      if [[ -f /etc/apt/sources/list.d/vscode.sources ]]; then
        log_info "✅ VS Code repository already configured"
      else
        printf 'Types: deb\nURIs: https://packages.microsoft.com/repos/code\nSuites: stable\nComponents: main\nArchitectures: amd64,arm64,armhf\nSigned-By: /usr/share/keyrings/microsoft.gpg\n' \
          | sudo tee /etc/apt/sources.list.d/vscode.sources > /dev/null
        log_info "✅ Microsoft repository added"
      fi

  - name: install_vscode
    script: |
      sudo apt-get install -y apt-transport-https
      sudo apt-get update
      sudo apt-get install -y code

  - name: install_vscode_extensions
    script: |
      EXTENSIONS=(
        "vscodevim.vim"
        "anthropic.claude-code"
      )

      for EXT in "${EXTENSIONS[@]}"; do
        if ! code --list-extensions | grep -q "$EXT"; then
          code --install-extension "$EXT"
        fi
      done

  - name: copy_configs
    script: |
      HOME_DIR="$HOME/.config/Code/User"
      mkdir -p "$HOME_DIR"
      ln -sf "$ROOT_DIR/config/vscode/settings.json" "$HOME_DIR/settings.json"

