name: vscode_arch_install
description: Install Visual Studio Code

steps:
  - name: install_vscode
    script: |
      yay -S --noconfirm visual-studio-code-bin

  - name: install_vscode_extensions
    script: |
      EXTENSIONS=(
        "vscodevim.vim"
        "anthropic.claude-code"
      )

      for EXT in "${EXTENSIONS[@]}"; do
        if ! code --list-extensions | grep -q "$EXT"; then
          code --install-extension "$EXT"
        fi
      done
  - name: copy_configs
    script: |
      HOME_DIR="$HOME/.config/Code/User"
      mkdir -p "$HOME_DIR"
      ln -sf "$ROOT_DIR/config/vscode/settings.json" "$HOME_DIR/settings.json"
  - name: fix_encryption
    script: |
      sudo pacman -S --noconfirm gnome-keyring libsecret
      mkdir -p "$HOME/.vscode"
      ln -sf "$ROOT_DIR/config/vscode/argv.json" "$HOME/.vscode/argv.json"
